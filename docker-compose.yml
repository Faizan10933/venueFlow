version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile # Assuming shared Dockerfile or custom one
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
